<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje kočička 🐱</title>
<style>
  :root {
    --bg1: #ffe9f3;
    --bg2: #e7f0ff;
    --card: #ffffff;
    --ink: #4a3f5c;
    --accent: #ff8fb1;
    --accent-dark: #e76a93;
    --cat: #b9883f;
    --cat-dark: #9c6f30;
    --cat-light: #d6a85e;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 40px;
  }

  h1 {
    margin: 6px 0 2px;
    font-size: 1.7rem;
    text-align: center;
  }
  .subtitle { margin: 0 0 14px; font-size: .95rem; opacity: .7; }

  .card {
    background: var(--card);
    border-radius: 26px;
    box-shadow: 0 14px 40px rgba(120, 90, 140, .18);
    padding: 22px 22px 26px;
    width: 100%;
  }

  /* ---------- Rozložení: jeden sloupec přes celou šířku (scéna nahoře, panel dole) ---------- */
  .layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 560px;
    align-items: stretch;
  }
  .layout > .card { margin: 0; }
  .look-title { margin: 2px 0 14px; font-size: 1.2rem; text-align: center; }

  /* ---------- Záložky panelu vzhledu ---------- */
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab {
    flex: 1 1 0;
    border: 0;
    border-radius: 12px;
    padding: 9px 4px;
    font-size: .82rem;
    font-weight: 700;
    color: var(--ink);
    background: #f0e8f5;
    cursor: pointer;
    transition: background .15s, color .15s, transform .08s;
  }
  .tab:active { transform: translateY(1px); }
  .tab.is-active { background: var(--accent); color: #fff; box-shadow: 0 3px 0 var(--accent-dark); }
  .tab-panel.is-hidden { display: none; }

  /* ---------- Scéna s kočkou ---------- */
  .scene {
    position: relative;
    height: 330px;
    border-radius: 20px;
    background: linear-gradient(180deg, #fef6ff 0%, #f1e6ff 100%);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .scene.sleeping { background: linear-gradient(180deg, #2c2547 0%, #3d3266 100%); }
  #catCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 4; }
  /* během přechodu na canvas skryjeme starou CSS kočku (smaže se v úklidové fázi) */
  #cat, #friend { display: none !important; }
  .floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 46px;
    background: rgba(180,150,200,.18);
  }

  /* ---------- Prostředí (pozadí scény) ---------- */
  /* Zahrada */
  .scene.env-garden:not(.sleeping) { background: linear-gradient(180deg, #aee4ff 0%, #cdeeff 55%, #e7f8ff 100%); }
  .scene.env-garden .floor { height: 56px; background: linear-gradient(#82d06c, #5cb04a); }
  .scene.env-garden:not(.sleeping)::before {  /* sluníčko */
    content: ""; position: absolute; top: 16px; right: 22px;
    width: 42px; height: 42px; border-radius: 50%;
    background: #ffe06a; box-shadow: 0 0 0 9px rgba(255,224,106,.35);
    z-index: 0;
  }
  /* Ulice (cihlová zeď + dlažba) */
  .scene.env-street:not(.sleeping) {
    background-color: #cf7d57;
    background-image:
      repeating-linear-gradient(0deg,  rgba(0,0,0,0) 0 20px, #efe2d2 20px 24px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 44px, #efe2d2 44px 48px);
  }
  .scene.env-street .floor { height: 52px; background: linear-gradient(#aeb2bb, #8d919b); }
  .scene.env-street:not(.sleeping)::before {  /* okno ve zdi */
    content: ""; position: absolute; top: 22px; left: 22px;
    width: 44px; height: 52px;
    background: linear-gradient(160deg, #cdeaf7, #a9d6ec);
    border: 5px solid #efe2d2;
    z-index: 0;
  }
  /* Noc */
  .scene.env-night:not(.sleeping) {
    background:
      radial-gradient(circle at 18% 24%, #fff 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 58% 16%, #fff 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 78% 34%, #fff 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 38% 40%, #fff 0 1.1px, transparent 1.7px),
      radial-gradient(circle at 88% 60%, #fff 0 1.1px, transparent 1.7px),
      linear-gradient(180deg, #1b2a4a 0%, #33305a 100%);
  }
  .scene.env-night .floor { height: 50px; background: rgba(70,90,130,.32); }
  .scene.env-night:not(.sleeping)::before {  /* měsíc */
    content: ""; position: absolute; top: 16px; right: 24px;
    width: 34px; height: 34px; border-radius: 50%;
    background: #f3f0d8; box-shadow: 0 0 0 7px rgba(243,240,216,.16);
    z-index: 0;
  }

  .speech {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%) scale(.6);
    background: #fff;
    color: var(--ink);
    padding: 7px 14px;
    border-radius: 16px;
    font-size: .9rem;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    white-space: nowrap;
    z-index: 5;
  }
  .speech.show { opacity: 1; transform: translateX(-50%) scale(1); }
  .speech::after {
    content: "";
    position: absolute;
    bottom: -7px; left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #fff;
    border-bottom: 0;
  }

  /* ---------- Kočka (čisté CSS) ---------- */
  .cat {
    position: relative;
    width: 170px;
    height: 190px;
    margin-bottom: 30px;
    transform-origin: bottom center;
    animation: breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50%      { transform: scaleY(1.025) translateY(-2px); }
  }

  /* tělo */
  .body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 110px;
    background: var(--cat);
    border-radius: 60px 60px 52px 52px;
    z-index: 2;
  }
  .belly {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 78px;
    height: 80px;
    background: var(--cat-light);
    border-radius: 50% 50% 46px 46px;
    z-index: 3;
  }
  /* tlapky */
  .paw {
    position: absolute;
    bottom: 0;
    width: 40px;
    height: 26px;
    background: var(--cat);
    border-radius: 18px 18px 14px 14px;
    z-index: 4;
  }
  .paw.left  { left: 30px; }
  .paw.right { right: 30px; }

  /* ocásek */
  .tail {
    position: absolute;
    bottom: 8px;
    right: 4px;
    width: 22px;
    height: 76px;
    background: var(--cat);
    border-radius: 14px;
    transform-origin: bottom center;
    z-index: 1;
    animation: wag 2.4s ease-in-out infinite;
  }
  @keyframes wag {
    0%, 100% { transform: rotate(18deg); }
    50%      { transform: rotate(46deg); }
  }

  /* hlava */
  .head {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 104px;
    background: var(--cat);
    border-radius: 50% 50% 46% 46%;
    z-index: 6;
  }
  /* uši */
  .ear {
    position: absolute;
    top: -16px;
    width: 0; height: 0;
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-bottom: 40px solid var(--cat);
    z-index: 5;
  }
  .ear.left  { left: 6px;  transform: rotate(-18deg); }
  .ear.right { right: 6px; transform: rotate(18deg); }
  .ear::after {
    content: "";
    position: absolute;
    left: -12px; top: 16px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid #f3b6c9;
  }

  /* oči */
  .eye {
    position: absolute;
    top: 40px;
    width: 20px;
    height: 24px;
    background: var(--eye, #2c2540);
    border-radius: 50%;
    z-index: 7;
    transition: height .12s ease;
  }
  .eye.left  { left: 28px; }
  .eye.right { right: 28px; }
  .eye::after {
    content: "";
    position: absolute;
    top: 4px; left: 4px;
    width: 7px; height: 7px;
    background: #fff;
    border-radius: 50%;
  }
  /* mrkání */
  .cat.blink .eye { height: 3px; }
  .cat.blink .eye::after { opacity: 0; }
  /* spánek = zavřené oči (oblouček) */
  .cat.asleep .eye {
    height: 10px;
    background: transparent;
    border-bottom: 4px solid var(--eye, #2c2540);
    border-radius: 0 0 12px 12px;
    top: 48px;
  }
  .cat.asleep .eye::after { opacity: 0; }

  /* tváře */
  .cheek {
    position: absolute;
    top: 62px;
    width: 18px; height: 12px;
    background: #f7a8c0;
    border-radius: 50%;
    opacity: .7;
    z-index: 7;
  }
  .cheek.left  { left: 16px; }
  .cheek.right { right: 16px; }

  /* čumák + pusa */
  .nose {
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 10px;
    background: #e76a93;
    border-radius: 50% 50% 50% 50%;
    z-index: 8;
  }
  .mouth {
    position: absolute;
    top: 72px; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 11px;
    border: 2.5px solid #6b4a2b;
    border-top: 0;
    border-radius: 0 0 14px 14px;
    z-index: 7;
  }
  /* smutná pusa */
  .cat.sad .mouth { border: 0; border-top: 2.5px solid #6b4a2b; border-radius: 14px 14px 0 0; top: 78px; }

  /* vousky */
  .whisker {
    position: absolute;
    top: 64px;
    width: 38px; height: 2px;
    background: rgba(80,60,40,.55);
    border-radius: 2px;
    z-index: 7;
  }
  .whisker.l1 { left: -22px; transform: rotate(8deg); }
  .whisker.l2 { left: -22px; top: 72px; transform: rotate(-6deg); }
  .whisker.r1 { right: -22px; transform: rotate(-8deg); }
  .whisker.r2 { right: -22px; top: 72px; transform: rotate(6deg); }

  /* ---------- Varianty uší ---------- */
  /* kulaté uši – zakulacené, ale protáhlé do oblouku (kočičí, ne kulaté jak myš) */
  .cat.ears-round .ear {
    border: 0;
    top: -14px;
    width: 38px; height: 46px;
    background: var(--cat);
    border-radius: 50% 50% 26% 26% / 75% 75% 28% 28%;
  }
  .cat.ears-round .ear.left  { left: 8px;  transform: rotate(-16deg); }
  .cat.ears-round .ear.right { right: 8px; transform: rotate(16deg); }
  .cat.ears-round .ear::after {
    left: 50%; top: 54%;
    transform: translate(-50%, -50%);
    border: 0;
    width: 18px; height: 26px;
    background: #f3b6c9;
    border-radius: 50% 50% 30% 30% / 72% 72% 30% 30%;
  }

  /* ---------- Varianty ocásku ---------- */
  .cat.tail-fluffy .tail { width: 34px; right: 0; border-radius: 18px; }
  .cat.tail-short  .tail { height: 44px; }

  /* ---------- Doplněk: půllitr s pivem ---------- */
  .beer { display: none; }
  .cat.has-beer .beer {
    display: block;
    position: absolute;
    z-index: 9;
    right: 10px;
    bottom: 16px;
    width: 26px;
    height: 34px;
    background: linear-gradient(180deg, #ffe27a 0%, #ffc83a 35%, #f0a512 100%);
    border: 2px solid rgba(255,255,255,.75);
    border-radius: 5px 5px 7px 7px;
    box-shadow: inset -4px 0 0 rgba(255,255,255,.28);
  }
  .cat.has-beer .beer::before {   /* pěna */
    content: "";
    position: absolute;
    left: -3px; right: -3px; top: -9px;
    height: 14px;
    background: #fff;
    border-radius: 10px 10px 6px 6px;
  }
  .cat.has-beer .beer::after {    /* ouško půllitru */
    content: "";
    position: absolute;
    right: -11px; top: 7px;
    width: 11px; height: 18px;
    border: 4px solid #e8a21a;
    border-left: 0;
    border-radius: 0 9px 9px 0;
  }
  /* pivo jen pro sedící kočku – v leže se nezobrazuje */
  .cat.lying.has-beer .beer { display: none; }

  /* ---------- Doplněk: sklenice vína ---------- */
  .wine { display: none; }
  .cat.has-wine .wine {
    display: block;
    position: absolute;
    z-index: 9;
    right: 14px;
    bottom: 18px;
    width: 22px;
    height: 22px;
    background: linear-gradient(180deg, #a52742 0%, #7c1830 100%);
    border: 2px solid rgba(255,255,255,.6);
    border-radius: 5px 5px 46% 46% / 5px 5px 80% 80%;
    box-shadow: inset -3px 0 0 rgba(255,255,255,.16);
  }
  .cat.has-wine .wine::before {   /* stopka */
    content: "";
    position: absolute;
    left: 50%; bottom: -13px;
    transform: translateX(-50%);
    width: 3px; height: 14px;
    background: rgba(225,216,230,.9);
  }
  .cat.has-wine .wine::after {    /* podstavec */
    content: "";
    position: absolute;
    left: 50%; bottom: -15px;
    transform: translateX(-50%);
    width: 16px; height: 4px;
    background: rgba(225,216,230,.95);
    border-radius: 50%;
  }
  /* víno jen pro sedící kočku – v leže se nezobrazuje */
  .cat.lying.has-wine .wine { display: none; }

  /* ---------- Hračky (na zemi vedle kočky) ---------- */
  .toy-yarn, .toy-ball, .toy-mouse {
    display: none;
    position: absolute;
    left: -18px;
    bottom: 2px;
    z-index: 5;
  }
  /* klubíčko */
  .cat.has-yarn .toy-yarn {
    display: block;
    width: 30px; height: 30px;
    border-radius: 50%;
    background:
      repeating-linear-gradient(48deg, rgba(0,0,0,.08) 0 4px, transparent 4px 9px),
      repeating-linear-gradient(-48deg, rgba(255,255,255,.3) 0 4px, transparent 4px 9px),
      #ef9bc4;
    box-shadow: inset -4px -4px 0 rgba(0,0,0,.07);
  }
  .cat.has-yarn .toy-yarn::after {   /* nitka */
    content: "";
    position: absolute;
    left: 24px; top: 17px;
    width: 14px; height: 12px;
    border: 2px solid #ef9bc4;
    border-top: 0; border-left: 0;
    border-radius: 0 0 12px 0;
  }
  /* barevný míček */
  .cat.has-ball .toy-ball {
    display: block;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: conic-gradient(#ff6b6b, #ffd166, #06d6a0, #4dabf7, #b197fc, #ff6b6b);
    box-shadow: inset -4px -4px 0 rgba(0,0,0,.08), inset 4px 4px 0 rgba(255,255,255,.2);
  }
  /* myška na provázku */
  .cat.has-mouse .toy-mouse {
    display: block;
    width: 28px; height: 16px;
    background:
      radial-gradient(circle at 14% 52%, #e98aa8 0 2.6px, transparent 3.1px),
      radial-gradient(circle at 32% 40%, #2c2540 0 1.7px, transparent 2.1px),
      #b9b3c4;
    border-radius: 60% 50% 50% 55% / 75% 60% 60% 75%;
  }
  .cat.has-mouse .toy-mouse::before {   /* ouško */
    content: "";
    position: absolute;
    left: 6px; top: -5px;
    width: 11px; height: 11px;
    background: #b9b3c4;
    border-radius: 50%;
  }
  .cat.has-mouse .toy-mouse::after {    /* provázek */
    content: "";
    position: absolute;
    right: -2px; top: -16px;
    width: 20px; height: 18px;
    border: 2px solid #c9a23b;
    border-bottom: 0; border-left: 0;
    border-radius: 0 14px 0 0;
  }

  /* ---------- Hraní si s hračkou (akce Hrát) ---------- */
  /* míček i klubíčko se kutálí po zemi sem a tam (z jedné tlapky do druhé) */
  .cat.playing.has-ball .toy-ball,
  .cat.playing.has-yarn .toy-yarn {
    animation: rollToy 1.5s ease-in-out infinite;
  }
  @keyframes rollToy {
    0%   { transform: translateX(60px)  rotate(0deg); }
    50%  { transform: translateX(134px) rotate(360deg); }
    100% { transform: translateX(60px)  rotate(0deg); }
  }
  /* myška na provázku se houpe ze strany na stranu */
  .cat.playing.has-mouse .toy-mouse {
    transform-origin: 50% -12px;
    animation: swingToy 1.1s ease-in-out infinite;
  }
  @keyframes swingToy {
    0%, 100% { transform: translateX(74px)  rotate(-20deg); }
    50%      { transform: translateX(106px) rotate(20deg); }
  }

  /* ---------- Krmení: miska s granulemi ---------- */
  .bowl {
    display: none;
    position: absolute;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    width: 66px;
    height: 24px;
    z-index: 8;
  }
  .bowl { display: none !important; }   /* misku kreslí canvas (starý DOM prvek skryt) */
  .bowl::before {   /* miska */
    content: "";
    position: absolute;
    left: 0; bottom: 0;
    width: 66px; height: 17px;
    background: linear-gradient(#d6deec, #9eafc7);
    border-radius: 12px 12px 32px 32px / 8px 8px 26px 26px;
  }
  .bowl::after {    /* granule navrchu */
    content: "";
    position: absolute;
    left: 9px; top: 0;
    width: 48px; height: 13px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 18% 55%, #9a6230 0 4px, transparent 4.8px),
      radial-gradient(circle at 42% 32%, #7d4d23 0 4px, transparent 4.8px),
      radial-gradient(circle at 64% 58%, #ab703a 0 4px, transparent 4.8px),
      radial-gradient(circle at 85% 40%, #7d4d23 0 3.6px, transparent 4.4px),
      radial-gradient(circle at 32% 80%, #ab703a 0 3.4px, transparent 4.2px),
      #b87f44;
  }
  /* mlíko v misce místo granulí */
  .cat.food-milk ~ .bowl::after {
    left: 7px;
    width: 52px;
    height: 12px;
    background:
      radial-gradient(circle at 30% 32%, rgba(255,255,255,.95) 0 4px, transparent 7px),
      linear-gradient(#ffffff, #eceef6);
    box-shadow: inset 0 -2px 0 rgba(120,130,160,.12);
  }

  /* kočka se sklání k misce a uzobává */
  .cat.eating { animation: eat 1.2s ease-in-out infinite; }
  @keyframes eat {
    0%, 100% { transform: translateY(0) scaleY(1); }
    42%      { transform: translateY(12px) scaleY(.9); }
    58%      { transform: translateY(12px) scaleY(.9); }
  }

  /* ---------- Veselá nálada (po napití) ---------- */
  .cat.merry { animation: merry .9s ease-in-out infinite; }
  @keyframes merry {
    0%, 100% { transform: rotate(-3.5deg); }
    50%      { transform: rotate(3.5deg); }
  }
  .cat.merry .cheek { opacity: 1; width: 22px; height: 14px; }

  /* ---------- Veselá po víně: poskakování + šťastný obličej ---------- */
  .cat.merry-wine { animation: merryWine 1s ease-in-out infinite; }
  @keyframes merryWine {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    20%      { transform: translateY(-12px) rotate(0deg); }
    40%      { transform: translateY(0) rotate(3deg); }
    60%      { transform: translateY(-9px) rotate(0deg); }
    80%      { transform: translateY(0) rotate(-3deg); }
  }
  /* přimhouřené šťastné oči (^^) */
  .cat.merry-wine .eye {
    height: 10px;
    background: transparent;
    border-top: 4px solid var(--eye, #2c2540);
    border-bottom: 0;
    border-radius: 12px 12px 0 0;
    top: 44px;
  }
  .cat.merry-wine .eye::after { opacity: 0; }
  /* velký úsměv */
  .cat.merry-wine .mouth {
    width: 26px;
    height: 16px;
    border-width: 3px;
    top: 70px;
  }

  /* ---------- Vzor: mourovatá (tabby) ---------- */
  /* jemné pruhy jen po bocích těla (břicho je zakryje) */
  .cat.tabby .body {
    background-image:
      repeating-linear-gradient(94deg,
        transparent 0 18px,
        rgba(55,38,22,.15) 18px 21px);
  }
  /* tabby znak na čele – pár tenkých čárek mezi oušky */
  .cat.tabby .head::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 24px;
    background: repeating-linear-gradient(90deg,
      transparent 0 6px,
      rgba(55,38,22,.17) 6px 8.5px);
    -webkit-mask-image: radial-gradient(ellipse at top, #000 55%, transparent 78%);
    mask-image: radial-gradient(ellipse at top, #000 55%, transparent 78%);
    z-index: 6;
  }
  /* jemné svislé pruhy na ocásku */
  .cat.tabby .tail {
    background-image: repeating-linear-gradient(90deg,
      transparent 0 6px,
      rgba(55,38,22,.16) 6px 9px);
  }

  /* ---------- Duhová srst ---------- */
  .cat.rainbow-fur {
    --rainbow: linear-gradient(105deg,
      #ff9aa2, #ffd36e, #b6f08a, #7fe0d8, #8ab6ff, #d79bff);
  }
  .cat.rainbow-fur .head,
  .cat.rainbow-fur .body,
  .cat.rainbow-fur .paw { background-image: var(--rainbow); }
  .cat.rainbow-fur .tail {
    background-image: linear-gradient(180deg,
      #ff9aa2, #ffd36e, #b6f08a, #7fe0d8, #8ab6ff, #d79bff);
  }
  .cat.rainbow-fur .belly { background: rgba(255,255,255,.5); }
  .cat.rainbow-fur.ears-round .ear { background-image: var(--rainbow); }

  /* ---------- Černobílá: bílé tlapky a bílý konec ocásku ---------- */
  .cat.white-paws .paw { background: #f3f0ea; }
  /* bílá špička ocásku – sedící (bílý vršek ocásku) */
  .cat.white-paws:not(.lying) .tail::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 20px;
    background: #f3f0ea;
    border-radius: 14px 14px 10px 10px;
  }
  /* bílá špička ocásku – ležící (přebarví koncovou čepičku) */
  .cat.lying.white-paws .tail::after { background: #f3f0ea; }

  /* ---------- Kamarád (druhá kočka, stejně velká, sedí vedle) ---------- */
  .friend {
    display: none;
    margin-left: 2px;
    /* pevná barva kamaráda (šedý) */
    --cat: #9aa0a8; --cat-dark: #7c828b; --cat-light: #c6cbd1; --eye: #2c2540;
    transform-origin: bottom center;
    animation: friendPlay 1.1s ease-in-out infinite;
  }
  .scene.has-friend .friend { display: block; }   /* flex sourozenec → sedí vedle hlavní kočky */
  @keyframes friendPlay {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  /* když se spí, kamarád neposkakuje, jen klidně dýchá */
  .friend.asleep { animation: breathe 3.4s ease-in-out infinite; }
  /* obě kočky se k sobě natočí a dívají se na sebe */
  .scene.has-friend #cat:not(.lying) .head  { transform: translateX(-50%) rotate(7deg); }
  .scene.has-friend .friend .head           { transform: translateX(-50%) rotate(-7deg); }
  .scene.has-friend #cat:not(.lying) .eye   { transform: translateX(3px); }
  .scene.has-friend .friend .eye            { transform: translateX(-3px); }

  /* hračka přihrávaná mezi kočkami – létá obloukem tam a zpět */
  .pass-fly {
    position: absolute;
    bottom: 30px;
    left: 0;
    font-size: 1.7rem;
    line-height: 1;
    z-index: 9;
    pointer-events: none;
    animation: passFly 1.3s ease-in-out infinite;
  }
  /* míček/hračka se kutálí po zemi tam a zpět (rotace podle směru valení) */
  @keyframes passFly {
    0%   { transform: translateX(0) rotate(0deg); }
    50%  { transform: translateX(var(--dx)) rotate(360deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }

  /* ---------- Povely (ovládání) ---------- */
  /* běhání / honění míčku – cval: skok s nadlehčením (squash&stretch), náklon do směru */
  .cat.cmd-run, .cat.cmd-chase { animation: cmdRun 1.4s ease-in-out infinite; }
  @keyframes cmdRun {
    0%   { transform: translateX(-78px) translateY(0)    rotate(-8deg) scale(1, 1); }
    12%  { transform: translateX(-52px) translateY(-20px) rotate(-5deg) scale(.9, 1.12); }   /* odraz – protažení */
    25%  { transform: translateX(0)     translateY(-2px)  rotate(0deg)  scale(1.08, .9); }    /* dopad – stlačení */
    37%  { transform: translateX(52px)  translateY(-20px) rotate(5deg)  scale(.9, 1.12); }
    50%  { transform: translateX(78px)  translateY(0)     rotate(8deg)  scale(1, 1); }
    62%  { transform: translateX(52px)  translateY(-20px) rotate(5deg)  scale(.9, 1.12); }
    75%  { transform: translateX(0)     translateY(-2px)  rotate(0deg)  scale(1.08, .9); }
    87%  { transform: translateX(-52px) translateY(-20px) rotate(-5deg) scale(.9, 1.12); }
    100% { transform: translateX(-78px) translateY(0)     rotate(-8deg) scale(1, 1); }
  }
  /* přední nohy se při cvalu střídají */
  .cat.cmd-run .paw.left,  .cat.cmd-chase .paw.left  { animation: runPawA .35s ease-in-out infinite; }
  .cat.cmd-run .paw.right, .cat.cmd-chase .paw.right { animation: runPawB .35s ease-in-out infinite; }
  @keyframes runPawA { 0%,100% { transform: translateY(0) translateX(0); }      50% { transform: translateY(-10px) translateX(5px); } }
  @keyframes runPawB { 0%,100% { transform: translateY(-10px) translateX(-5px); } 50% { transform: translateY(0) translateX(0); } }
  /* ocásek vlaje za během */
  .cat.cmd-run .tail, .cat.cmd-chase .tail { animation: runTail .35s ease-in-out infinite; }
  @keyframes runTail { 0%,100% { transform: rotate(30deg); } 50% { transform: rotate(56deg); } }
  /* jazyk (vyplázne se jen při čištění) */
  .tongue {
    position: absolute;
    top: 80px; left: 50%;
    transform: translateX(-50%);
    width: 13px; height: 9px;
    background: #f48aae;
    border-radius: 0 0 7px 7px;
    z-index: 7;
    display: none;
  }
  /* čištění tlapek – kočka zvedne tlapku k tlamě, vyplázne jazyk a olizuje se */
  .cat.cmd-groom .paw.right {
    z-index: 8;
    animation: groomPaw .55s ease-in-out infinite;
  }
  @keyframes groomPaw {
    0%, 100% { transform: translate(-44px, -76px) rotate(-14deg); }
    50%      { transform: translate(-44px, -70px) rotate(-14deg); }
  }
  .cat.cmd-groom .tongue {
    display: block;
    animation: groomLick .55s ease-in-out infinite;
  }
  @keyframes groomLick {
    0%, 100% { height: 9px; }
    50%      { height: 17px; }
  }
  /* honěný míček se kutálí sem a tam před kočkou */
  .chase-ball {
    position: absolute;
    bottom: 34px;
    left: 50%;
    margin-left: -14px;
    font-size: 1.6rem;
    line-height: 1;
    z-index: 9;
    pointer-events: none;
    animation: chaseBall .9s ease-in-out infinite;
  }
  @keyframes chaseBall {
    0%, 100% { transform: translateX(-95px) rotate(0deg); }
    50%      { transform: translateX(95px) rotate(360deg); }
  }

  /* ---------- Poloha: ležící ---------- */
  /* širší, nižší rámec – kočka leží podél */
  .cat.lying {
    width: 220px;
    height: 160px;
  }
  /* hlava menší (scale), položená dole vlevo u země, lehce nakloněná */
  .cat.lying .head {
    top: auto;
    bottom: 0;
    left: -4px;
    transform-origin: bottom left;
    transform: rotate(-6deg) scale(.82);
  }
  /* tělo – hlavní masa: dlouhý nízký bochánek */
  .cat.lying .body {
    left: 40px;
    right: auto;
    transform: none;
    width: 142px;
    height: 84px;
    bottom: 0;
    border-radius: 58px 64px 46px 46px / 60px 64px 42px 42px;
  }
  /* světlejší podsada dole na těle */
  .cat.lying .belly {
    left: 64px;
    right: auto;
    transform: none;
    width: 108px;
    height: 28px;
    bottom: 4px;
    border-radius: 50%;
  }
  /* přední tlapky schované pod tělem (jen vykukují vepředu) */
  .cat.lying .paw {
    width: 30px;
    height: 16px;
    bottom: 0;
    border-radius: 12px 12px 10px 10px;
  }
  .cat.lying .paw.left  { left: 80px;  right: auto; }
  .cat.lying .paw.right { left: 112px; right: auto; }
  /* ocásek – vychází ze zadní části těla, zvedá se nad záda a stáčí se, zakulacený konec */
  .cat.lying .tail {
    left: 113px;
    right: auto;
    bottom: 47px;
    width: 70px;
    height: 70px;
    background: transparent;
    border: 14px solid var(--cat);
    border-bottom-color: transparent;
    border-left-color: transparent;
    border-radius: 50%;
    z-index: 5;
    transform-origin: 55px 55px;   /* otáčení kolem základny zanořené v těle */
    animation: wagLie 3.2s ease-in-out infinite;
  }
  /* zakulacené konce oblouku */
  .cat.lying .tail::before,
  .cat.lying .tail::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--cat);
    border-radius: 50%;
  }
  .cat.lying .tail::before { left: 34px; top: 34px; }   /* základna (zanořená v těle) */
  .cat.lying .tail::after  { left: -6px; top: -6px; }   /* zaoblená špička */
  @keyframes wagLie {
    0%, 100% { transform: rotate(6deg); }
    50%      { transform: rotate(16deg); }
  }
  /* ležící – nadýchaný: silnější, huňatý ocas */
  .cat.lying.tail-fluffy .tail {
    left: 116px;
    bottom: 44px;
    border-width: 22px;
    transform-origin: 52px 52px;
  }
  .cat.lying.tail-fluffy .tail::before,
  .cat.lying.tail-fluffy .tail::after { width: 22px; height: 22px; }
  .cat.lying.tail-fluffy .tail::before { left: 19px; top: 19px; }
  .cat.lying.tail-fluffy .tail::after  { left: -15px; top: -15px; }
  /* ležící – krátký: menší zatočení */
  .cat.lying.tail-short .tail {
    left: 127px;
    bottom: 49px;
    width: 54px;
    height: 54px;
    transform-origin: 41px 41px;
  }
  .cat.lying.tail-short .tail::before { left: 20px; top: 20px; }
  .cat.lying.tail-short .tail::after  { left: -8px; top: -8px; }

  /* ---------- Animace akcí ---------- */
  .cat.jump   { animation: jump .55s ease; }
  @keyframes jump {
    0%,100% { transform: translateY(0); }
    40%     { transform: translateY(-46px); }
    60%     { transform: translateY(-46px); }
  }
  .cat.wiggle { animation: wiggle .6s ease; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25%     { transform: rotate(-6deg); }
    75%     { transform: rotate(6deg); }
  }

  /* poletující srdíčka / symboly */
  .float-emoji {
    position: absolute;
    font-size: 1.7rem;
    pointer-events: none;
    animation: floatUp 1.2s ease-out forwards;
    z-index: 9;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(.6); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-90px) scale(1.2); }
  }
  /* spící Z */
  .zzz {
    position: absolute;
    top: 30px; right: 46px;
    color: #cdbcf5;
    font-weight: 700;
    font-size: 1.4rem;
    opacity: 0;
    z-index: 9;
  }
  .scene.sleeping .zzz { animation: zzz 2.2s ease-in-out infinite; }
  @keyframes zzz {
    0%   { opacity: 0; transform: translateY(0) scale(.6); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-50px) translateX(20px) scale(1.3); }
  }

  /* ---------- Ukazatele ---------- */
  .stats { margin: 18px 2px 6px; }
  .stat { margin-bottom: 12px; }
  .stat-top {
    display: flex;
    justify-content: space-between;
    font-size: .92rem;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .bar {
    height: 16px;
    background: #eee4ef;
    border-radius: 10px;
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    width: 100%;
    border-radius: 10px;
    transition: width .4s ease, background .4s ease;
  }
  .bar.hunger > span  { background: linear-gradient(90deg,#ffb347,#ff7b54); }
  .bar.happy  > span  { background: linear-gradient(90deg,#ffd166,#ff8fb1); }
  .bar.energy > span  { background: linear-gradient(90deg,#7ad0ff,#5b8def); }
  .bar.clean  > span  { background: linear-gradient(90deg,#7be3c4,#39c0a0); }
  .bar.low > span     { background: linear-gradient(90deg,#ff6b6b,#d63447) !important; }

  /* ---------- Tlačítka ---------- */
  .actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  button.action {
    border: 0;
    border-radius: 16px;
    padding: 14px 8px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    background: var(--accent);
    box-shadow: 0 5px 0 var(--accent-dark);
    transition: transform .08s, box-shadow .08s, opacity .2s;
  }
  button.action:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--accent-dark); }
  button.action:disabled { opacity: .45; cursor: not-allowed; box-shadow: 0 5px 0 var(--accent-dark); }
  .btn-feed  { background:#ff9f43; box-shadow:0 5px 0 #e07d1c; }
  .btn-play  { background:#ff8fb1; box-shadow:0 5px 0 #e0648c; }
  .btn-pet   { background:#c084fc; box-shadow:0 5px 0 #9d57e0; }
  .btn-clean { background:#39c0a0; box-shadow:0 5px 0 #1f9c7e; }
  .btn-friend { background:#6c8cff; box-shadow:0 5px 0 #4a6ae0; grid-column: span 2; }
  .btn-drink { background:#f0a818; box-shadow:0 5px 0 #c9860c; grid-column: span 2; }
  .btn-sleep { background:#5b8def; box-shadow:0 5px 0 #3a6bd0; grid-column: span 2; }

  /* ---------- Povely (ovládání) ---------- */
  .cmd-label { margin: 16px 2px 6px; font-size: .85rem; font-weight: 700; opacity: .7; }
  .commands { display: flex; flex-wrap: wrap; gap: 8px; }
  .cmd {
    flex: 1 1 auto;
    border: 0;
    border-radius: 12px;
    padding: 11px 10px;
    font-size: .9rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    background: #8a7cff;
    box-shadow: 0 4px 0 #6a5ce0;
    transition: transform .08s, box-shadow .08s, opacity .2s;
  }
  .cmd:active { transform: translateY(3px); box-shadow: 0 1px 0 #6a5ce0; }
  .cmd:disabled { opacity: .45; cursor: not-allowed; box-shadow: 0 4px 0 #6a5ce0; }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    font-size: .85rem;
    opacity: .8;
  }
  .link-btn {
    background: none; border: 0; color: var(--accent-dark);
    font-weight: 700; cursor: pointer; font-size: .85rem;
  }
  .link-btn:hover { text-decoration: underline; }

  /* ---------- Úvodní obrazovka ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(60,40,80,.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .overlay.hidden { display: none; }
  .dialog {
    background: #fff;
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .dialog h2 { margin: 0 0 6px; }
  .dialog p { margin: 0 0 18px; opacity: .75; font-size: .92rem; }
  .dialog input {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border: 2px solid #eadff0;
    border-radius: 14px;
    margin-bottom: 16px;
    text-align: center;
  }
  .dialog input:focus { outline: none; border-color: var(--accent); }
  .dialog button {
    width: 100%;
    border: 0;
    border-radius: 14px;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    box-shadow: 0 5px 0 var(--accent-dark);
    cursor: pointer;
  }
  .dialog button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-dark); }

  /* ---------- Panel vzhledu ---------- */
  .look-section { margin-bottom: 16px; }
  .look-label { font-weight: 700; font-size: .92rem; margin-bottom: 8px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #e3d9ec;
    cursor: pointer;
    padding: 0;
    transition: box-shadow .12s, transform .08s;
  }
  .swatch:active { transform: scale(.92); }
  .swatch.sel { box-shadow: 0 0 0 3px var(--accent-dark); }
  .opt-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn {
    border: 2px solid #eadff0;
    background: #fff;
    color: var(--ink);
    border-radius: 12px;
    padding: 9px 15px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
  }
  .opt-btn.sel { border-color: var(--accent-dark); background: var(--accent); color: #fff; }

  /* ---------- Responzivní jemné doladění ---------- */
  @media (max-width: 720px) {
    .look-card { max-width: 440px; }   /* na mobilu plná šířka pod kočkou */
  }
  @media (max-width: 420px) {
    body { padding: 14px 10px 30px; }
    .card { padding: 18px 16px 20px; }
    h1 { font-size: 1.45rem; }
    .scene { height: 210px; }
    .actions { gap: 8px; }
    button.action { padding: 12px 6px; font-size: .95rem; }
  }
</style>
</head>
<body>

  <h1>Moje kočička <span id="catNameTitle"></span></h1>
  <p class="subtitle">Starej se o ni, ať je šťastná! 🐾</p>

  <div class="layout">
  <div class="card">
    <div class="scene" id="scene">
      <canvas id="catCanvas"></canvas>
      <div class="floor"></div>
      <div class="speech" id="speech"></div>
      <div class="zzz">z</div>

      <div class="cat" id="cat">
        <div class="tail"></div>
        <div class="paw left"></div>
        <div class="paw right"></div>
        <div class="beer"></div>
        <div class="wine"></div>
        <div class="toy-yarn"></div>
        <div class="toy-ball"></div>
        <div class="toy-mouse"></div>
        <div class="body"></div>
        <div class="belly"></div>
        <div class="head">
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
          <div class="tongue"></div>
          <div class="whisker l1"></div>
          <div class="whisker l2"></div>
          <div class="whisker r1"></div>
          <div class="whisker r2"></div>
        </div>
      </div>
      <div class="cat friend" id="friend" aria-hidden="true">
        <div class="tail"></div>
        <div class="paw left"></div>
        <div class="paw right"></div>
        <div class="body"></div>
        <div class="belly"></div>
        <div class="head">
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
          <div class="tongue"></div>
          <div class="whisker l1"></div>
          <div class="whisker l2"></div>
          <div class="whisker r1"></div>
          <div class="whisker r2"></div>
        </div>
        <div class="beer"></div>
        <div class="wine"></div>
      </div>
      <div class="bowl"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-top"><span>🍗 Sytost</span><span id="hungerVal">100%</span></div>
        <div class="bar hunger" id="hungerBar"><span></span></div>
      </div>
      <div class="stat">
        <div class="stat-top"><span>😺 Štěstí</span><span id="happyVal">100%</span></div>
        <div class="bar happy" id="happyBar"><span></span></div>
      </div>
      <div class="stat">
        <div class="stat-top"><span>⚡ Energie</span><span id="energyVal">100%</span></div>
        <div class="bar energy" id="energyBar"><span></span></div>
      </div>
      <div class="stat">
        <div class="stat-top"><span>🧼 Čistota</span><span id="cleanVal">100%</span></div>
        <div class="bar clean" id="cleanBar"><span></span></div>
      </div>
    </div>

    <div class="actions">
      <button class="action btn-feed"  id="btnFeed">🍗 Nakrmit</button>
      <button class="action btn-play"  id="btnPlay">🧶 Hrát</button>
      <button class="action btn-pet"   id="btnPet">💗 Pohladit</button>
      <button class="action btn-clean" id="btnClean">🧼 Uklidit</button>
      <button class="action btn-friend" id="btnFriend">🐱 Kamarád</button>
      <button class="action btn-drink" id="btnDrink">🍺 Napít se</button>
      <button class="action btn-sleep" id="btnSleep">😴 Spát</button>
    </div>

    <div class="cmd-label">🎮 Povely</div>
    <div class="commands">
      <button class="cmd" id="cmdRun">🏃 Běhat</button>
      <button class="cmd" id="cmdChase">⚽ Honit míček</button>
      <button class="cmd" id="cmdGroom">🧼 Čistit se</button>
    </div>

    <div class="footer">
      <span id="moodText">Spokojená kočička 😊</span>
      <button class="link-btn" id="btnReset">Nová hra</button>
    </div>
  </div>

  <!-- Panel vzhledu (vedle kočky) -->
  <aside class="card look-card">
    <h2 class="look-title">Vzhled 🎨</h2>

    <div class="tabs">
      <button type="button" class="tab is-active" data-tab="kocka">🐱 Kočka</button>
      <button type="button" class="tab" data-tab="doplnky">🎀 Doplňky</button>
      <button type="button" class="tab" data-tab="scena">🌳 Scéna</button>
    </div>

    <div class="tab-panel" data-panel="kocka">
      <div class="look-section">
        <div class="look-label">Barva srsti</div>
        <div class="swatches" id="colorOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Vzor</div>
        <div class="opt-row" id="patternOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Oči</div>
        <div class="swatches" id="eyeOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Uši</div>
        <div class="opt-row" id="earOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Ocásek</div>
        <div class="opt-row" id="tailOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Poloha</div>
        <div class="opt-row" id="poseOpts"></div>
      </div>
    </div>

    <div class="tab-panel is-hidden" data-panel="doplnky">
      <div class="look-section">
        <div class="look-label">Pití (drží v tlapce)</div>
        <div class="opt-row" id="accOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Hračka</div>
        <div class="opt-row" id="toyOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">V misce</div>
        <div class="opt-row" id="foodOpts"></div>
      </div>
    </div>

    <div class="tab-panel is-hidden" data-panel="scena">
      <div class="look-section">
        <div class="look-label">Prostředí</div>
        <div class="opt-row" id="envOpts"></div>
      </div>
      <div class="look-section">
        <div class="look-label">Barva kamaráda 🐱</div>
        <div class="swatches" id="friendColorOpts"></div>
      </div>
    </div>
  </aside>
  </div>

  <!-- Úvodní obrazovka -->
  <div class="overlay" id="startOverlay">
    <div class="dialog">
      <h2>Vítej! 🐱</h2>
      <p>Jak se bude tvoje kočička jmenovat?</p>
      <input id="nameInput" type="text" maxlength="14" placeholder="Např. Micka" autocomplete="off">
      <button id="startBtn">Začít hrát</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  const SAVE_KEY = "kocky_save_v1";
  const MAX = 100;

  // Stav hry
  let state = {
    name: "Micka",
    hunger: 100,  // sytost
    happy: 100,   // štěstí
    energy: 100,  // energie
    clean: 100,   // čistota
    sleeping: false,
    hasFriend: false,
    friendColor: "seda",
    appearance: { color: "rezava", pattern: "jednobarevna", eyes: "tmava", ears: "spicate", tail: "dlouhy", pose: "sedici", accessory: "zadny", toy: "zadna", food: "granule", env: "pokoj" },
    lastTick: Date.now()
  };

  // ----- Možnosti vzhledu -----
  const PALETTES = {
    rezava:    { cat: "#e07b39", dark: "#bb5f27", light: "#f4a566", label: "Rezavá" },
    seda:      { cat: "#9aa0a8", dark: "#7c828b", light: "#c6cbd1", label: "Šedá" },
    cerna:     { cat: "#54506a", dark: "#403c54", light: "#736f8c", label: "Černá" },
    cernobila: { cat: "#454250", dark: "#332f3c", light: "#5c5868", label: "Černobílá", whitePaws: true,
                 swatch: "linear-gradient(135deg,#454250 0 55%,#f3f0ea 55%)" },
    bila:      { cat: "#ece3d0", dark: "#cabfa6", light: "#fbf6ea", label: "Bílá" },
    ruzova:    { cat: "#f0a9c4", dark: "#d77fa0", light: "#ffd0e0", label: "Růžová" },
    svetlemodra: { cat: "#aacdf5", dark: "#7fa8d8", light: "#d6e8fb", label: "Světle modrá" },
    duhova: {
      cat: "#ff9aa2", dark: "#c98bd6", light: "#ffd6ea", label: "Duhová",
      rainbow: true,
      swatch: "linear-gradient(135deg,#ff9aa2,#ffd36e,#b6f08a,#7fe0d8,#8ab6ff,#d79bff)"
    }
  };
  const EYES = {
    tmava:  { color: "#2c2540", label: "Tmavé" },
    zelena: { color: "#3a9d5d", label: "Zelené" },
    modra:  { color: "#3f86d6", label: "Modré" },
    jantar: { color: "#e0962f", label: "Jantarové" }
  };
  const PATTERNS = { jednobarevna: "Jednobarevná", mourovata: "Mourovatá" };
  const EARS  = { spicate: "Špičaté", kulate: "Kulaté" };
  const TAILS = { dlouhy: "Dlouhý", nadychany: "Nadýchaný", kratky: "Krátký" };
  const POSES = { sedici: "Sedící", lezici: "Ležící" };
  const ACCESSORIES = { zadny: "Žádný", pivo: "Pivo 🍺", vino: "Víno 🍷" };
  const TOYS = { zadna: "Žádná", klubicko: "Klubíčko 🧶", micek: "Míček ⚽", myska: "Myška 🐭" };
  const FOODS = { granule: "Granule 🥣", mliko: "Mlíko 🥛" };
  const ENVIRONMENTS = { pokoj: "Pokoj 🏠", zahrada: "Zahrada 🌳", ulice: "Ulice 🧱", noc: "Noc 🌙" };

  // Rychlost poklesu hodnot za 1 sekundu (bdění)
  const DECAY = { hunger: 0.55, happy: 0.45, energy: 0.40, clean: 0.30 };
  // Při spánku
  const DECAY_SLEEP = { hunger: 0.25, happy: 0.15, clean: 0.15 };
  const ENERGY_GAIN_SLEEP = 1.6; // za sekundu

  // ----- DOM -----
  const el = (id) => document.getElementById(id);
  const cat = el("cat");
  const scene = el("scene");
  const speech = el("speech");
  const startOverlay = el("startOverlay");

  const bars = {
    hunger: { bar: el("hungerBar"), span: el("hungerBar").firstElementChild, val: el("hungerVal") },
    happy:  { bar: el("happyBar"),  span: el("happyBar").firstElementChild,  val: el("happyVal") },
    energy: { bar: el("energyBar"), span: el("energyBar").firstElementChild, val: el("energyVal") },
    clean:  { bar: el("cleanBar"),  span: el("cleanBar").firstElementChild,  val: el("cleanVal") }
  };

  const clamp = (v) => Math.max(0, Math.min(MAX, v));

  // ----- Uložení / načtení -----
  function save() {
    state.lastTick = Date.now();
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (typeof data !== "object" || data === null) return false;
      state = Object.assign(state, data);
      // Dopočítej pokles podle uplynulého času (max 24 h, ať to není drsné)
      const elapsedSec = Math.min((Date.now() - (state.lastTick || Date.now())) / 1000, 86400);
      applyDecay(elapsedSec);
      return true;
    } catch (e) { return false; }
  }

  function applyDecay(sec) {
    if (state.sleeping) {
      state.hunger = clamp(state.hunger - DECAY_SLEEP.hunger * sec);
      state.happy  = clamp(state.happy  - DECAY_SLEEP.happy  * sec);
      state.clean  = clamp(state.clean  - DECAY_SLEEP.clean  * sec);
      state.energy = clamp(state.energy + ENERGY_GAIN_SLEEP * sec);
      if (state.energy >= MAX) { state.energy = MAX; state.sleeping = false; }
    } else {
      state.hunger = clamp(state.hunger - DECAY.hunger * sec);
      state.happy  = clamp(state.happy  - DECAY.happy  * sec);
      state.energy = clamp(state.energy - DECAY.energy * sec);
      state.clean  = clamp(state.clean  - DECAY.clean  * sec);
    }
  }

  // ----- Vzhled -----
  function applyAppearance() {
    const a = state.appearance || (state.appearance = {});
    const p = PALETTES[a.color] || PALETTES.rezava;
    cat.style.setProperty("--cat", p.cat);
    cat.style.setProperty("--cat-dark", p.dark);
    cat.style.setProperty("--cat-light", p.light);
    cat.classList.toggle("rainbow-fur", !!p.rainbow);
    cat.classList.toggle("white-paws", !!p.whitePaws);

    const e = EYES[a.eyes] || EYES.tmava;
    cat.style.setProperty("--eye", e.color);

    cat.classList.toggle("tabby", a.pattern === "mourovata");

    cat.classList.toggle("ears-round", a.ears === "kulate");

    cat.classList.remove("tail-fluffy", "tail-short");
    if (a.tail === "nadychany") cat.classList.add("tail-fluffy");
    else if (a.tail === "kratky") cat.classList.add("tail-short");

    cat.classList.toggle("lying", a.pose === "lezici");
    cat.classList.toggle("has-beer", a.accessory === "pivo");
    cat.classList.toggle("has-wine", a.accessory === "vino");

    cat.classList.toggle("has-yarn", a.toy === "klubicko");
    cat.classList.toggle("has-ball", a.toy === "micek");
    cat.classList.toggle("has-mouse", a.toy === "myska");
    cat.classList.toggle("food-milk", a.food === "mliko");

    // Prostředí (pozadí scény)
    scene.classList.toggle("env-garden", a.env === "zahrada");
    scene.classList.toggle("env-street", a.env === "ulice");
    scene.classList.toggle("env-night",  a.env === "noc");
  }

  // Barva kamaráda (druhá kočka) – vlastní paleta, nezávislá na hlavní kočce
  function applyFriendColor() {
    const fr = el("friend");
    if (!fr) return;
    const p = PALETTES[state.friendColor] || PALETTES.seda;
    fr.style.setProperty("--cat", p.cat);
    fr.style.setProperty("--cat-dark", p.dark);
    fr.style.setProperty("--cat-light", p.light);
    fr.classList.toggle("rainbow-fur", !!p.rainbow);
    fr.classList.toggle("white-paws", !!p.whitePaws);
    // kamarád drží stejné pití jako hlavní kočka
    fr.classList.toggle("has-beer", state.appearance.accessory === "pivo");
    fr.classList.toggle("has-wine", state.appearance.accessory === "vino");
  }

  function buildLookPanel() {
    const a = state.appearance;

    // Barvy
    const colorBox = el("colorOpts");
    colorBox.innerHTML = "";
    Object.keys(PALETTES).forEach((key) => {
      const p = PALETTES[key];
      const b = document.createElement("button");
      b.className = "swatch" + (a.color === key ? " sel" : "");
      b.style.background = p.swatch || p.cat;
      b.title = p.label;
      b.setAttribute("aria-label", p.label);
      b.addEventListener("click", () => {
        a.color = key;
        markSel(colorBox, b);
        afterLook();
      });
      colorBox.appendChild(b);
    });

    // Vzor srsti
    buildOptRow(el("patternOpts"), PATTERNS, "pattern");

    // Oči
    const eyeBox = el("eyeOpts");
    eyeBox.innerHTML = "";
    Object.keys(EYES).forEach((key) => {
      const e = EYES[key];
      const b = document.createElement("button");
      b.className = "swatch" + (a.eyes === key ? " sel" : "");
      b.style.background = e.color;
      b.title = e.label;
      b.setAttribute("aria-label", e.label);
      b.addEventListener("click", () => {
        a.eyes = key;
        markSel(eyeBox, b);
        afterLook();
      });
      eyeBox.appendChild(b);
    });

    // Uši
    buildOptRow(el("earOpts"), EARS, "ears");
    // Ocásek
    buildOptRow(el("tailOpts"), TAILS, "tail");
    // Poloha
    buildOptRow(el("poseOpts"), POSES, "pose");
    // Doplněk
    buildOptRow(el("accOpts"), ACCESSORIES, "accessory");
    // Hračka
    buildOptRow(el("toyOpts"), TOYS, "toy");
    // V misce (granule / mlíko)
    buildOptRow(el("foodOpts"), FOODS, "food");
    // Prostředí
    buildOptRow(el("envOpts"), ENVIRONMENTS, "env");

    // Barva kamaráda (vlastní paleta)
    const friendBox = el("friendColorOpts");
    friendBox.innerHTML = "";
    Object.keys(PALETTES).forEach((key) => {
      const p = PALETTES[key];
      const b = document.createElement("button");
      b.className = "swatch" + (state.friendColor === key ? " sel" : "");
      b.style.background = p.swatch || p.cat;
      b.title = p.label;
      b.setAttribute("aria-label", p.label);
      b.addEventListener("click", () => {
        state.friendColor = key;
        markSel(friendBox, b);
        applyFriendColor();
        save();
      });
      friendBox.appendChild(b);
    });
  }

  function buildOptRow(box, options, prop) {
    box.innerHTML = "";
    Object.keys(options).forEach((key) => {
      const b = document.createElement("button");
      b.className = "opt-btn" + (state.appearance[prop] === key ? " sel" : "");
      b.textContent = options[key];
      b.addEventListener("click", () => {
        state.appearance[prop] = key;
        markSel(box, b);
        afterLook();
      });
      box.appendChild(b);
    });
  }

  function markSel(box, btn) {
    box.querySelectorAll(".sel").forEach((x) => x.classList.remove("sel"));
    btn.classList.add("sel");
  }

  function afterLook() {
    applyAppearance();
    applyFriendColor();
    save();
  }

  // ----- Vykreslení -----
  function render() {
    applyAppearance();
    applyFriendColor();

    for (const key in bars) {
      const v = Math.round(state[key]);
      bars[key].span.style.width = v + "%";
      bars[key].val.textContent = v + "%";
      bars[key].bar.classList.toggle("low", v <= 25);
    }
    el("catNameTitle").textContent = state.name ? "– " + state.name : "";

    // Spánek
    scene.classList.toggle("sleeping", state.sleeping);
    cat.classList.toggle("asleep", state.sleeping);
    el("friend").classList.toggle("asleep", state.sleeping);
    el("btnSleep").textContent = state.sleeping ? "☀️ Probudit" : "😴 Spát";
    scene.classList.toggle("has-friend", !!state.hasFriend);
    el("btnFriend").textContent = state.hasFriend ? "👋 Rozloučit" : "🐱 Kamarád";

    // Nálada + výraz
    updateMood();
    updateButtons();
  }

  function avg() {
    return (state.hunger + state.happy + state.energy + state.clean) / 4;
  }

  function updateMood() {
    const moodEl = el("moodText");
    cat.classList.remove("sad");

    if (state.sleeping) {
      moodEl.textContent = state.name + " spinká… 💤";
      return;
    }
    if (cat.classList.contains("merry")) {
      moodEl.textContent = "Veselá! 🥳🍻";
      return;
    }
    // Priorita konkrétních potřeb
    if (state.hunger <= 25)      { moodEl.textContent = "Mám hlad! 🍗"; cat.classList.add("sad"); }
    else if (state.clean <= 25)  { moodEl.textContent = "Je mi špinavo… 🧼"; cat.classList.add("sad"); }
    else if (state.energy <= 25) { moodEl.textContent = "Jsem unavená… 😪"; }
    else if (state.happy <= 25)  { moodEl.textContent = "Je mi smutno… 😿"; cat.classList.add("sad"); }
    else if (avg() >= 75)        { moodEl.textContent = "Spokojená kočička 😻"; }
    else                          { moodEl.textContent = "V pohodě 😺"; }
  }

  function updateButtons() {
    const sleeping = state.sleeping;
    // Během spánku jdou jen probudit; ostatní akce vypnuté
    el("btnFeed").disabled  = sleeping;
    el("btnPlay").disabled  = sleeping || state.energy < 8;
    el("btnPet").disabled   = sleeping;
    el("btnClean").disabled = sleeping;
    el("btnDrink").disabled = sleeping;
    el("btnFriend").disabled = sleeping;
    el("cmdRun").disabled = sleeping;
    el("cmdChase").disabled = sleeping;
    el("cmdGroom").disabled = sleeping;
  }

  // ----- Efekty -----
  function showSpeech(text) {
    speech.textContent = text;
    speech.classList.add("show");
    clearTimeout(showSpeech._t);
    showSpeech._t = setTimeout(() => speech.classList.remove("show"), 1300);
  }

  function floatEmoji(symbol, count) {
    count = count || 3;
    for (let i = 0; i < count; i++) {
      const s = document.createElement("div");
      s.className = "float-emoji";
      s.textContent = symbol;
      s.style.left = (35 + Math.random() * 30) + "%";
      s.style.bottom = (90 + Math.random() * 20) + "px";
      s.style.animationDelay = (i * 0.12) + "s";
      scene.appendChild(s);
      setTimeout(() => s.remove(), 1400 + i * 120);
    }
  }

  function animateCat(cls) {
    cat.classList.remove("jump", "wiggle");
    void cat.offsetWidth; // restart animace
    cat.classList.add(cls);
    setTimeout(() => cat.classList.remove(cls), 650);
  }

  // ----- Akce -----
  function feed() {
    if (state.sleeping) return;
    state.hunger = clamp(state.hunger + 28);
    state.clean  = clamp(state.clean - 4);
    // před kočku se postaví miska s granulemi a kočka se k ní sklání a jí
    cat.classList.add("eating");
    clearTimeout(feed._t);
    feed._t = setTimeout(() => cat.classList.remove("eating"), 3600);
    showSpeech(state.appearance.food === "mliko" ? "Mňam, mlíko! 😋" : "Mňam! 😋");
    after();
  }

  function play() {
    if (state.sleeping || state.energy < 8) return;
    state.happy  = clamp(state.happy + 26);
    state.energy = clamp(state.energy - 12);
    state.hunger = clamp(state.hunger - 6);
    const toy = state.appearance.toy;
    if (state.hasFriend) {
      // s kamarádem si hračku navzájem přihrávají
      passToyBetween(toy);
    } else if (toy && toy !== "zadna") {
      // kočka si chvíli hraje s nasazenou hračkou (kutálení / houpání)
      cat.classList.add("playing");
      clearTimeout(play._t);
      play._t = setTimeout(() => cat.classList.remove("playing"), 4000);
      floatEmoji(toy === "klubicko" ? "🧶" : toy === "micek" ? "⚽" : "🐭");
      showSpeech("Hurá, hračka! 🐾");
    } else {
      animateCat("jump");
      floatEmoji("🧶");
      showSpeech("Jupí! 🐾");
    }
    after();
  }

  // Přihrávání hračky mezi kočkou a kamarádem (létá obloukem tam a zpět)
  function passToyBetween(toy) {
    const emoji = toy === "klubicko" ? "🧶" : toy === "myska" ? "🐭" : "⚽";
    const sc = scene.getBoundingClientRect();
    const c = el("cat").getBoundingClientRect();
    const f = el("friend").getBoundingClientRect();
    const startX = (c.left + c.right) / 2 - sc.left;
    const dx = (f.left + f.right) / 2 - sc.left - startX;
    const fly = document.createElement("div");
    fly.className = "pass-fly";
    fly.textContent = emoji;
    fly.style.left = (startX - 15) + "px";
    fly.style.setProperty("--dx", dx + "px");
    scene.appendChild(fly);
    setTimeout(() => fly.remove(), 3700);
    animateCat("wiggle");
    showSpeech("Přihrávka! " + emoji);
  }

  function pet() {
    if (state.sleeping) return;
    state.happy = clamp(state.happy + 16);
    animateCat("wiggle");
    floatEmoji("💗");
    showSpeech("Předu… 😽");
    after();
  }

  function clean() {
    if (state.sleeping) return;
    state.clean = clamp(state.clean + 35);
    state.happy = clamp(state.happy + 4);
    animateCat("wiggle");
    floatEmoji("✨");
    showSpeech("Čisto! 🧼");
    after();
  }

  // ----- Povely (ovládání kočky) -----
  function command(name) {
    if (state.sleeping) return;
    cat.classList.remove("cmd-run", "cmd-chase", "cmd-groom");
    document.querySelectorAll(".chase-ball").forEach((e) => e.remove());
    clearTimeout(command._t);
    let dur = 3000;
    if (name === "run") {
      cat.classList.add("cmd-run");
      state.energy = clamp(state.energy - 4);
      state.happy  = clamp(state.happy + 8);
      showSpeech("Běžím! 🏃");
    } else if (name === "chase") {
      if (state.appearance.toy && state.appearance.toy !== "zadna" && typeof TOY !== "undefined") {
        // hodí nasazenou hračku a kočka se za ní rozběhne
        TOY.vx = 260 + Math.random() * 170; TOY.vy = -(360 + Math.random() * 130);
        cat.classList.add("cmd-chase");
        state.energy = clamp(state.energy - 4);
        state.happy  = clamp(state.happy + 8);
        showSpeech("Chyť ho! 🐾");
      } else {
        cat.classList.add("cmd-chase");
        const ball = document.createElement("div");
        ball.className = "chase-ball";
        ball.textContent = "⚽";
        scene.appendChild(ball);
        dur = 3600;
        setTimeout(() => ball.remove(), dur);
        state.energy = clamp(state.energy - 5);
        state.happy  = clamp(state.happy + 10);
        showSpeech("Chyť ho! ⚽");
      }
    } else if (name === "groom") {
      cat.classList.add("cmd-groom");
      state.clean = clamp(state.clean + 12);
      state.happy = clamp(state.happy + 6);
      floatEmoji("✨");
      showSpeech("Čistím se… 🧼");
    }
    command._t = setTimeout(() => {
      cat.classList.remove("cmd-run", "cmd-chase", "cmd-groom");
    }, dur);
    after();
  }

  function drink() {
    if (state.sleeping) return;
    // víno má dvojnásobný efekt na veselou náladu než pivo
    const wine = state.appearance.accessory === "vino";
    state.happy = clamp(state.happy + (wine ? 68 : 34));
    floatEmoji(wine ? "🍷" : "🍺", 4);
    showSpeech(wine ? "Na zdraví! 🍷" : "Na zdraví! 🍻");
    // chvíli rozjařeně veselá (zhoupnutí + růžové tvářičky); víno drží déle
    // a navíc poskakuje + má šťastný obličej – kamarád se přidá
    const drinkers = [cat, el("friend")];
    drinkers.forEach((elm) => {
      if (!elm) return;
      elm.classList.add("merry");
      if (wine) elm.classList.add("merry-wine");
    });
    clearTimeout(drink._t);
    drink._t = setTimeout(() => {
      drinkers.forEach((elm) => elm && elm.classList.remove("merry", "merry-wine"));
      render();
    }, wine ? 12000 : 6000);
    after();
  }

  function toggleFriend() {
    state.hasFriend = !state.hasFriend;
    if (state.hasFriend) {
      state.happy = clamp(state.happy + 20);
      animateCat("wiggle");
      floatEmoji("💕", 4);
      showSpeech("Kamarád! 😻");
    } else {
      showSpeech("Pa pa! 👋");
    }
    after();
  }

  function toggleSleep() {
    state.sleeping = !state.sleeping;
    if (state.sleeping) showSpeech("Dobrou noc… 😴");
    else showSpeech("Dobré ráno! ☀️");
    after();
  }

  function after() {
    render();
    save();
  }

  // ----- Mrkání -----
  function scheduleBlink() {
    const delay = 2200 + Math.random() * 3200;
    setTimeout(() => {
      if (!state.sleeping) {
        cat.classList.add("blink");
        setTimeout(() => cat.classList.remove("blink"), 160);
      }
      scheduleBlink();
    }, delay);
  }

  // ----- Hlavní smyčka -----
  function tick() {
    applyDecay(1); // 1 sekunda
    render();
    save();
  }

  // ----- Nová hra -----
  function newGame(name) {
    const keepLook = state.appearance || { color: "rezava", pattern: "jednobarevna", eyes: "tmava", ears: "spicate", tail: "dlouhy", pose: "sedici", accessory: "zadny", toy: "zadna", food: "granule", env: "pokoj" };
    const keepFriend = state.friendColor || "seda";
    state = {
      name: name || "Micka",
      hunger: 100, happy: 100, energy: 100, clean: 100,
      sleeping: false,
      hasFriend: false,
      friendColor: keepFriend,
      appearance: keepLook,
      lastTick: Date.now()
    };
    save();
    render();
  }

  // ----- Start -----
  function bindEvents() {
    el("btnFeed").addEventListener("click", feed);
    el("btnPlay").addEventListener("click", play);
    el("btnPet").addEventListener("click", pet);
    el("btnClean").addEventListener("click", clean);
    el("btnFriend").addEventListener("click", toggleFriend);
    el("btnDrink").addEventListener("click", drink);
    el("cmdRun").addEventListener("click", () => command("run"));
    el("cmdChase").addEventListener("click", () => command("chase"));
    el("cmdGroom").addEventListener("click", () => command("groom"));

    // přepínání záložek panelu vzhledu
    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("is-active"));
        t.classList.add("is-active");
        const name = t.getAttribute("data-tab");
        document.querySelectorAll(".tab-panel").forEach((p) => {
          p.classList.toggle("is-hidden", p.getAttribute("data-panel") !== name);
        });
      });
    });
    el("btnSleep").addEventListener("click", toggleSleep);

    el("btnReset").addEventListener("click", () => {
      if (confirm("Opravdu začít novou hru? Tvoje kočička začne od začátku.")) {
        startOverlay.classList.remove("hidden");
        el("nameInput").value = state.name || "";
        el("nameInput").focus();
      }
    });

    el("startBtn").addEventListener("click", startFromDialog);
    el("nameInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") startFromDialog();
    });
  }

  function startFromDialog() {
    const name = el("nameInput").value.trim() || "Micka";
    newGame(name);
    startOverlay.classList.add("hidden");
  }

  // ===== CAT: procedurální kreslení kočky (canvas, jednotkový prostor, y nahoru) =====
  const CAT = (function () {
    // hladká uzavřená křivka skrz body (kontrolní body = vrcholy, hrany přes středy)
    function smoothClosed(ctx, p) {
      const n = p.length; if (n < 3) return;
      ctx.beginPath();
      ctx.moveTo((p[n - 1][0] + p[0][0]) / 2, (p[n - 1][1] + p[0][1]) / 2);
      for (let i = 0; i < n; i++) {
        const c = p[i], q = p[(i + 1) % n];
        ctx.quadraticCurveTo(c[0], c[1], (c[0] + q[0]) / 2, (c[1] + q[1]) / 2);
      }
      ctx.closePath();
    }
    function ell(ctx, x, y, rx, ry, rot) {
      ctx.beginPath(); ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), rot || 0, 0, Math.PI * 2);
    }
    // tlustá kulatá čára (noha/ocas) jako vyplněný tvar
    function capsule(ctx, x1, y1, x2, y2, w) {
      const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len * w / 2, ny = dx / len * w / 2;
      ctx.beginPath();
      ctx.moveTo(x1 + nx, y1 + ny);
      ctx.lineTo(x2 + nx, y2 + ny);
      ctx.arc(x2, y2, w / 2, Math.atan2(ny, nx), Math.atan2(-ny, -nx), false);
      ctx.lineTo(x1 - nx, y1 - ny);
      ctx.arc(x1, y1, w / 2, Math.atan2(-ny, -nx), Math.atan2(ny, nx), false);
      ctx.closePath();
    }

    function defaultParams() {
      const p = PALETTES.rezava;
      return {
        fur: p.cat, dark: p.dark, light: p.light, eye: EYES.tmava.color,
        innerEar: "#f3b6c9", nose: "#e76a93",
        ears: "pointed", tail: "dlouhy", tabby: false, rainbow: false, whitePaws: false, pose: "sit",
        breath: 0, eyeOpen: 1, headTurn: 0, look: 0, tailSway: 0, earL: 0, earR: 0, mouth: 0
      };
    }

    // ---- jednotlivé části (jednotkový prostor, y nahoru, počátek = dotyk se zemí) ----
    function paw(ctx, x, P, fur) {
      ctx.fillStyle = fur; ell(ctx, x, 7, 16, 10); ctx.fill();
    }
    function frontLeg(ctx, x, P, fur) {
      ctx.fillStyle = fur; capsule(ctx, x, 60, x * 0.92, 9, 24); ctx.fill();
      ctx.fillStyle = (P.whitePaws ? "#f3f0ea" : fur);
      ell(ctx, x * 0.92, 7, 15, 10); ctx.fill();
    }
    function bodyShape(ctx) {
      smoothClosed(ctx, [
        [0, 2], [-44, 6], [-54, 34], [-52, 78], [-38, 120], [-22, 142],
        [0, 148], [22, 142], [38, 120], [52, 78], [54, 34], [44, 6]
      ]);
    }
    function headShape(ctx) {
      smoothClosed(ctx, [
        [0, 138], [-30, 144], [-47, 164], [-46, 194], [-30, 214], [-8, 222],
        [0, 223], [8, 222], [30, 214], [46, 194], [47, 164], [30, 144]
      ]);
    }

    function tabbyStroke(ctx) {
      ctx.strokeStyle = "rgba(60,42,26,.18)"; ctx.lineWidth = 4.5; ctx.lineCap = "round";
    }
    function tabbyBody(ctx) {
      ctx.save(); bodyShape(ctx); ctx.clip(); tabbyStroke(ctx);
      for (let y = 26; y <= 134; y += 20) {
        ctx.beginPath(); ctx.moveTo(-60, y - 6); ctx.quadraticCurveTo(0, y + 7, 60, y - 6); ctx.stroke();
      }
      ctx.restore();
    }
    function tabbyHead(ctx) {
      ctx.save(); headShape(ctx); ctx.clip(); tabbyStroke(ctx);
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * 11, 220); ctx.lineTo(i * 8, 196); ctx.stroke(); }
      ctx.restore();
    }

    function drawCatUnits(ctx, P) {
      const fur = P.fur, dark = P.dark, light = P.light;
      let fill = fur;
      if (P.rainbow) {
        const g = ctx.createLinearGradient(-55, 232, 55, 8);
        g.addColorStop(0, "#ff9aa2"); g.addColorStop(.2, "#ffd36e"); g.addColorStop(.4, "#b6f08a");
        g.addColorStop(.6, "#7fe0d8"); g.addColorStop(.8, "#8ab6ff"); g.addColorStop(1, "#d79bff");
        fill = g;
      }
      P._fill = fill;
      const pawFill = P.whitePaws ? "#f3f0ea" : fill;

      // kontaktní stín
      ctx.save();
      ctx.fillStyle = "rgba(40,30,50,.16)";
      ell(ctx, 0, 4, 64, 11); ctx.fill();
      ctx.restore();

      // ocásek (za tělem)
      const tw = P.tail === "nadychany" ? 28 : P.tail === "kratky" ? 18 : 18;
      const tLen = P.tail === "kratky" ? 0.62 : 1;
      ctx.save();
      ctx.translate(42, 16);
      ctx.rotate((P.tailSway || 0) * Math.PI / 180);
      ctx.fillStyle = fur;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(48 * tLen, 18 * tLen, 40 * tLen, 78 * tLen);
      ctx.lineWidth = tw; ctx.lineCap = "round"; ctx.strokeStyle = fill; ctx.stroke();
      if (P.whitePaws) { // bílá špička ocasu
        ctx.fillStyle = "#f3f0ea"; ell(ctx, 40 * tLen, 76 * tLen, tw / 2, tw / 2); ctx.fill();
      }
      ctx.restore();

      // zadní packy (vykukují vepředu dole)
      paw(ctx, -30, P, pawFill);
      paw(ctx, 30, P, pawFill);

      // tělo – tmavší podklad (stínování) + hlavní výplň
      ctx.save();
      ctx.translate(0, -3); ctx.fillStyle = dark; bodyShape(ctx); ctx.fill();
      ctx.restore();
      ctx.fillStyle = fill; bodyShape(ctx); ctx.fill();
      if (P.tabby) tabbyBody(ctx);

      // bříško (světlejší)
      ctx.save();
      ctx.fillStyle = light; ctx.globalAlpha = 0.9;
      ell(ctx, 0, 52, 33, 46); ctx.fill();
      ctx.restore();

      // přední nohy
      frontLeg(ctx, -16, P, fill);
      frontLeg(ctx, 16, P, fill);

      // hlava – podklad + výplň
      ctx.save();
      ctx.translate((P.headTurn || 0) * 0.4, 0);
      // uši nejdřív (za hlavou – základna se schová pod hlavu = pevně nasazené)
      drawEar(ctx, -1, P);
      drawEar(ctx, 1, P);
      ctx.save(); ctx.translate(0, -3); ctx.fillStyle = dark; headShape(ctx); ctx.fill(); ctx.restore();
      ctx.fillStyle = fill; headShape(ctx); ctx.fill();
      if (P.tabby) tabbyHead(ctx);

      // tvářičky (blush)
      ctx.fillStyle = "rgba(247,168,192,.5)";
      ell(ctx, -30, 166, 10, 6); ctx.fill();
      ell(ctx, 30, 166, 10, 6); ctx.fill();

      // oči
      drawEye(ctx, -22, 181, P);
      drawEye(ctx, 22, 181, P);

      // světlejší čumák (mulec)
      ctx.save();
      ctx.fillStyle = "rgba(255,250,246,.22)";
      ell(ctx, 0, 159, 19, 14); ctx.fill();
      ctx.restore();

      // čumáček (malý srdíčkový nos)
      ctx.fillStyle = P.nose;
      ctx.beginPath();
      ctx.moveTo(-5, 165); ctx.quadraticCurveTo(-5.5, 167.5, -2.5, 167.5);
      ctx.quadraticCurveTo(0, 167.5, 0, 165.5); ctx.quadraticCurveTo(0, 167.5, 2.5, 167.5);
      ctx.quadraticCurveTo(5.5, 167.5, 5, 165); ctx.lineTo(0, 160); ctx.closePath(); ctx.fill();
      // pusa – malá roztomilá ω
      ctx.strokeStyle = "rgba(90,62,48,.6)"; ctx.lineWidth = 2; ctx.lineCap = "round";
      const mc = (P.mouth || 0) + 0.35; // jemný úsměv jako základ
      ctx.beginPath();
      ctx.moveTo(0, 160); ctx.lineTo(0, 156);
      ctx.moveTo(0, 156); ctx.quadraticCurveTo(-3, 153 + mc * 3, -7, 156 + mc * 2.5);
      ctx.moveTo(0, 156); ctx.quadraticCurveTo(3, 153 + mc * 3, 7, 156 + mc * 2.5);
      ctx.stroke();

      // vousky
      ctx.strokeStyle = "rgba(80,60,45,.5)"; ctx.lineWidth = 1.6;
      for (let s = -1; s <= 1; s += 2) {
        for (let k = 0; k < 3; k++) {
          ctx.beginPath();
          ctx.moveTo(s * 10, 162 - k * 0.5);
          ctx.quadraticCurveTo(s * 34, 166 - k * 6 + 4, s * 44, 168 - k * 9 + 6);
          ctx.stroke();
        }
      }
      ctx.restore(); // konec hlavy

      // držené pití (jen vsedě) a olizování tlapky
      if (P.held === "pivo") drawBeer(ctx);
      else if (P.held === "vino") drawWine(ctx);
      if (P.groom) drawGroom(ctx, P);
    }

    function drawEar(ctx, side, P) {
      const fur = P._fill || P.fur;
      const tw = (side < 0 ? P.earL : P.earR) || 0;
      ctx.save();
      ctx.translate(side * 22, 204);            // posazené na hlavě
      ctx.scale(side, 1);                       // pravé ucho; levé zrcadlově
      ctx.rotate(tw * 0.6 * Math.PI / 180);     // jemné cuknutí
      ctx.fillStyle = fur;
      if (P.ears === "round") {
        // kulaté ucho – měkký zaoblený lalok
        ctx.beginPath();
        ctx.moveTo(-15, -2);
        ctx.quadraticCurveTo(-19, 25, 0, 31);
        ctx.quadraticCurveTo(19, 24, 14, -2);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = P.innerEar;
        ctx.beginPath();
        ctx.moveTo(-8, 3); ctx.quadraticCurveTo(-9, 19, 1, 22);
        ctx.quadraticCurveTo(10, 17, 8, 3); ctx.closePath(); ctx.fill();
      } else {
        // špičaté ucho – menší, špičatější s mírně zaoblenou špičkou
        ctx.beginPath();
        ctx.moveTo(-15, -2);
        ctx.quadraticCurveTo(-13, 22, -4, 33);   // vnitřní strana ke špičce
        ctx.quadraticCurveTo(3, 39, 9, 33);      // jen mírně zaoblená špička
        ctx.quadraticCurveTo(14, 22, 15, -2);    // vnější strana dolů
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = P.innerEar;
        ctx.beginPath();
        ctx.moveTo(-8, 3);
        ctx.quadraticCurveTo(-6, 20, -1, 26);
        ctx.quadraticCurveTo(3, 29, 6, 26);
        ctx.quadraticCurveTo(9, 18, 8, 3);
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    function drawEye(ctx, x, ey, P) {
      const open = Math.max(0.05, P.eyeOpen == null ? 1 : P.eyeOpen);
      const look = (P.look || 0);
      ctx.save();
      if (P.happyEyes) { // ^^ veselé přivřené oči
        ctx.strokeStyle = "#3a3450"; ctx.lineWidth = 3.4; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(x - 10, ey - 3); ctx.quadraticCurveTo(x, ey + 8, x + 10, ey - 3); ctx.stroke();
        ctx.restore(); return;
      }
      if (open < 0.16) { // zavřené – obloučky
        ctx.strokeStyle = "#3a3450"; ctx.lineWidth = 3; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(x - 10, ey); ctx.quadraticCurveTo(x, ey - 6, x + 10, ey); ctx.stroke();
        ctx.restore(); return;
      }
      // velké roztomilé oko: jemné bělmo + barevná duhovka + velká kulatá zornička + velký odlesk
      const ry = 15 * open;
      ctx.fillStyle = "#fff"; ell(ctx, x, ey, 12.5, ry + 1); ctx.fill();
      ctx.fillStyle = P.eye; ell(ctx, x + look * 3, ey, 11, Math.min(13.5, ry)); ctx.fill();           // velká duhovka
      ctx.fillStyle = "#241f33"; ell(ctx, x + look * 3, ey, 7, Math.min(9, ry * 0.82)); ctx.fill();    // velká kulatá zornička
      ctx.fillStyle = "rgba(255,255,255,.96)"; ell(ctx, x + look * 3 - 3.5, ey + 4.5, 3.6, 3.6); ctx.fill(); // velký odlesk
      ctx.fillStyle = "rgba(255,255,255,.7)"; ell(ctx, x + look * 3 + 3.5, ey - 3.5, 1.9, 1.9); ctx.fill(); // malý odlesk
      ctx.restore();
    }

    // ---- ležící kočka (hlava vlevo, podlouhlé tělo, ocas vpravo) ----
    function drawCatLyingUnits(ctx, P) {
      const fur = P.fur, dark = P.dark, light = P.light;
      let fill = fur;
      if (P.rainbow) {
        const g = ctx.createLinearGradient(-95, 70, 95, 0);
        g.addColorStop(0, "#ff9aa2"); g.addColorStop(.2, "#ffd36e"); g.addColorStop(.4, "#b6f08a");
        g.addColorStop(.6, "#7fe0d8"); g.addColorStop(.8, "#8ab6ff"); g.addColorStop(1, "#d79bff");
        fill = g;
      }
      P._fill = fill;
      const pawFill = P.whitePaws ? "#f3f0ea" : fill;

      ctx.save(); ctx.fillStyle = "rgba(40,30,50,.16)"; ell(ctx, 0, 3, 98, 12); ctx.fill(); ctx.restore();

      // ocas vpravo, stočený nahoru
      const tw = P.tail === "nadychany" ? 26 : 18, tl = P.tail === "kratky" ? 0.6 : 1;
      ctx.save(); ctx.translate(84, 14); ctx.rotate((P.tailSway || 0) * Math.PI / 180);
      ctx.strokeStyle = fill; ctx.lineWidth = tw; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(36 * tl, 10 * tl, 30 * tl, 62 * tl); ctx.stroke();
      if (P.whitePaws) { ctx.fillStyle = "#f3f0ea"; ell(ctx, 30 * tl, 60 * tl, tw / 2, tw / 2); ctx.fill(); }
      ctx.restore();

      // přední tlapky natažené dopředu (vlevo)
      ctx.fillStyle = pawFill; ell(ctx, -94, 7, 20, 9); ctx.fill(); ell(ctx, -74, 7, 20, 9); ctx.fill();

      // tělo – podlouhlý bochánek
      function bodyL() {
        smoothClosed(ctx, [[-72, 6], [-86, 28], [-64, 54], [-18, 66], [32, 66], [68, 54], [90, 30], [86, 8], [38, 2], [-34, 2]]);
      }
      ctx.save(); ctx.translate(0, -3); ctx.fillStyle = dark; bodyL(); ctx.fill(); ctx.restore();
      ctx.fillStyle = fill; bodyL(); ctx.fill();
      if (P.tabby) {
        ctx.save(); bodyL(); ctx.clip(); tabbyStroke(ctx);
        for (let x = -48; x <= 72; x += 20) { ctx.beginPath(); ctx.moveTo(x, 2); ctx.quadraticCurveTo(x - 6, 36, x, 66); ctx.stroke(); }
        ctx.restore();
      }
      // bříško
      ctx.save(); ctx.fillStyle = light; ctx.globalAlpha = .85; ell(ctx, 8, 16, 58, 15); ctx.fill(); ctx.restore();

      // hlava vlevo
      ctx.save(); ctx.translate(-64, 58 + (P.headTurn || 0) * 0.2);
      for (let sd = -1; sd <= 1; sd += 2) {
        const tw2 = (sd < 0 ? P.earL : P.earR) || 0;
        ctx.save(); ctx.translate(sd * 22, 28); ctx.rotate((sd * 10 + tw2) * Math.PI / 180);
        ctx.fillStyle = fill;
        if (P.ears === "round") { ell(ctx, 0, 4, 15, 17); ctx.fill(); ctx.fillStyle = P.innerEar; ell(ctx, 0, 3, 8, 9); ctx.fill(); }
        else {
          ctx.beginPath(); ctx.moveTo(-15, -4); ctx.lineTo(13, -2); ctx.lineTo(-2, 26); ctx.closePath(); ctx.fill();
          ctx.fillStyle = P.innerEar; ctx.beginPath(); ctx.moveTo(-9, 0); ctx.lineTo(8, 1); ctx.lineTo(-2, 18); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
      ctx.save(); ctx.translate(0, -3); ctx.fillStyle = dark; ell(ctx, 0, 0, 38, 34); ctx.fill(); ctx.restore();
      ctx.fillStyle = fill; ell(ctx, 0, 0, 38, 34); ctx.fill();
      ctx.fillStyle = "rgba(247,168,192,.5)"; ell(ctx, -22, -6, 9, 5); ctx.fill(); ell(ctx, 22, -6, 9, 5); ctx.fill();
      drawEye(ctx, -15, 4, P); drawEye(ctx, 15, 4, P);
      ctx.fillStyle = P.nose; ctx.beginPath(); ctx.moveTo(-5, -12); ctx.lineTo(5, -12); ctx.lineTo(0, -19); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    function roundRectU(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
    }
    // držené pivo (v jednotkovém prostoru, y nahoru) – u pravé přední tlapky
    function drawBeer(ctx) {
      ctx.save(); ctx.translate(24, 26);
      const g = ctx.createLinearGradient(0, 0, 0, 30); g.addColorStop(0, "#f0a512"); g.addColorStop(1, "#ffd24a");
      ctx.fillStyle = g; roundRectU(ctx, -11, 0, 22, 30, 4); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.5)"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.strokeStyle = "#e0980f"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(15, 14, 8, -1.1, 1.1); ctx.stroke();
      ctx.fillStyle = "#fff"; ell(ctx, 0, 31, 12, 5); ctx.fill(); ell(ctx, -5, 33, 6, 4); ctx.fill(); ell(ctx, 6, 33, 6, 4); ctx.fill();
      ctx.restore();
    }
    function drawWine(ctx) {
      ctx.save(); ctx.translate(24, 22);
      ctx.fillStyle = "rgba(228,222,234,.95)"; ell(ctx, 0, 0, 9, 3); ctx.fill();
      ctx.strokeStyle = "rgba(228,222,234,.95)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(0, 1); ctx.lineTo(0, 13); ctx.stroke();
      ctx.fillStyle = "#a52742"; ctx.beginPath();
      ctx.moveTo(-10, 30); ctx.quadraticCurveTo(-12, 17, 0, 13); ctx.quadraticCurveTo(12, 17, 10, 30); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.18)"; ell(ctx, -3, 22, 3, 6); ctx.fill();
      ctx.restore();
    }
    // olizování tlapky (čištění)
    function drawGroom(ctx, P) {
      const fur = P._fill || P.fur;
      ctx.save(); ctx.translate(0, -3); ctx.fillStyle = P.dark; ell(ctx, -9, 132, 13, 16); ctx.fill(); ctx.restore();
      ctx.fillStyle = fur; ell(ctx, -9, 135, 13, 16); ctx.fill();
      const ln = 5 + 7 * (P.lick || 0);
      ctx.fillStyle = "#f48aae";
      roundRectU(ctx, -3, 150 - ln, 6, ln, 3); ctx.fill();
    }
    // hračka na zemi vedle kočky
    function toyUnits(ctx, kind) {
      ctx.save();
      ctx.translate(-72, 9);
      if (kind === "klubicko") {
        ctx.fillStyle = "#ef9bc4"; ell(ctx, 0, 6, 14, 14); ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,.10)"; ctx.lineWidth = 2;
        for (let a = -2; a <= 2; a++) { ctx.beginPath(); ctx.moveTo(-13, 6 + a * 5); ctx.quadraticCurveTo(0, 6 + a * 2, 13, 6 + a * 5); ctx.stroke(); }
      } else if (kind === "micek") {
        const g = ctx.createLinearGradient(-14, 0, 14, 12);
        g.addColorStop(0, "#ff6b6b"); g.addColorStop(.5, "#4dabf7"); g.addColorStop(1, "#06d6a0");
        ctx.fillStyle = g; ell(ctx, 0, 6, 14, 14); ctx.fill();

  const TOY = {

    canvas: null, ctx: null, w: 0, h: 0, dpr: 1, frames: 0, last: 0, time: 0, freeze: false,

    },
    resize() {

    computeAnim(P, t, cl, blink) {

      P.earL = 2.5 * Math.sin(t * 0.8);
      P.earR = 2.5 * Math.sin(t * 0.8 + 1.2);

      if (cl.contains("merry")) { P.rot += 4 * Math.sin(t * 6); P.mouth = 0.5; }

    drawFrame() {
