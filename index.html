        const facingRight = Math.cos(runT) >= 0;
        const phase = (t * 2.0) % 1;
        if (hasToy) CAT.drawToyAt(ctx, TOY.x, TOY.y, TOY.radius(), toyKind, TOY.spin);
        CAT.drawRun(ctx, { cx: rx, groundY: gy, scale: scale, flip: !facingRight, P: P, phase: phase });
      } else {
        if (hasFriend) { P.headTurn = 6; P.look = 0.7; }
        CAT.draw(ctx, { cx: cx, groundY: gy, scale: scale, flip: false, P: P });
        if (hasToy) CAT.drawToyAt(ctx, TOY.x, TOY.y, TOY.radius(), toyKind, TOY.spin);
        if (cat.classList.contains("eating")) CAT.drawBowl(ctx, opts, state.appearance.food === "mliko");
      }
    },
    loop(t) {
      const dt = this.last ? Math.min((t - this.last) / 1000, 0.05) : 0;
      this.last = t; this.dt = dt;
      this.time += dt;
      this.frames++;
      this._beat = (window.performance && performance.now) ? performance.now() : Date.now();
      try { this.drawFrame(); } catch (e) { /* chyba jednoho snímku nesmí shodit animaci */ }
      if (!document.hidden && !this.freeze) requestAnimationFrame((tt) => this.loop(tt));
    },
    renderOnce() { this.frames++; this.drawFrame(); }
  };

  // ===== POINTER: hraní myší/dotykem (hlazení + tahání/házení hračky) =====
  const POINTER = {
    mode: null, acc: 0, last: null,
    _pos(e) { const r = VIEW.canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; },
    _overCat(p) {
      const sc = VIEW.scale || 1;
      const cx = state.hasFriend ? VIEW.w * 0.33 : VIEW.w * 0.5, gy = VIEW.h - 24;
      return Math.abs(p.x - cx) < 80 * sc && p.y > gy - 250 * sc && p.y < gy + 8;
    },
    down(e) {
      const p = this._pos(e);
      try { VIEW.canvas.setPointerCapture(e.pointerId); } catch (x) {}
      // chytit hračku?
      if (TOY.inited && state.appearance.toy !== "zadna" && Math.hypot(p.x - TOY.x, p.y - TOY.y) < TOY.radius() + 16) {
        this.mode = "toy"; TOY.dragging = true; this.last = p; this._tv = { vx: 0, vy: 0 }; this._tt = performance.now();
        return;
      }
      if (this._overCat(p)) { this.mode = "pet"; this.acc = 999; this.last = p; this._stroke(p); }
    },
    move(e) {
      if (!this.mode) return;
      const p = this._pos(e);
      if (this.mode === "toy") {
        const now = performance.now(), d = Math.max(8, now - this._tt);
        this._tv = { vx: (p.x - this.last.x) / d * 1000, vy: (p.y - this.last.y) / d * 1000 };
        TOY.x = p.x; TOY.y = p.y; this._tt = now; this.last = p;
        return;
      }
      this.acc += Math.hypot(p.x - this.last.x, p.y - this.last.y); this.last = p;
      if (this.acc > 32) { this.acc = 0; this._stroke(p); }
    },
    up() {
      if (this.mode === "toy") {
        TOY.dragging = false;
        const cap = 900;
        TOY.vx = Math.max(-cap, Math.min(cap, this._tv.vx));
        TOY.vy = Math.max(-cap, Math.min(cap, this._tv.vy));
        if (Math.abs(TOY.vx) + Math.abs(TOY.vy) > 60) { state.happy = clamp(state.happy + 4); render(); }
      }
      this.mode = null;
    },
    _stroke(p) {
      if (state.sleeping) return;
      state.happy = clamp(state.happy + 3);
      floatEmoji("💗", 1);
      cat.classList.add("petting");
      clearTimeout(this._t); this._t = setTimeout(() => cat.classList.remove("petting"), 700);
      if (!this._spoke || performance.now() - this._spoke > 2500) { this._spoke = performance.now(); showSpeech("Předu… 😽"); }
      render();
    }
  };

  function init() {
    bindEvents();
    scheduleBlink();

    const hadSave = load();
    // Doplň chybějící klíče vzhledu (kvůli starším uloženým hrám)
    state.appearance = Object.assign(
      { color: "rezava", pattern: "jednobarevna", eyes: "tmava", ears: "spicate", tail: "dlouhy", pose: "sedici", accessory: "zadny", toy: "zadna", food: "granule", env: "pokoj" },
      state.appearance || {}
    );
    // staré uložené hry s odebranou barvou (zrzavá/hnědá) → nastav rezavou
    if (!PALETTES[state.appearance.color]) state.appearance.color = "rezava";
    buildLookPanel(); // až po načtení, ať panel ukazuje uložený vzhled
    if (hadSave) {
      startOverlay.classList.add("hidden");
      render();
    } else {
      // První spuštění → zeptej se na jméno
      startOverlay.classList.remove("hidden");
      el("nameInput").focus();
      render();
    }

    // Vykreslovací smyčka (canvas)
    VIEW.init(); window.__TOY = TOY; // ladicí přístup (odstraní se v úklidu)

    // Herní smyčka každou 1 s
    setInterval(tick, 1000);
    // Ulož i při zavření
    window.addEventListener("beforeunload", save);
  }

  init();
})();
</script>
</body>
</html>
